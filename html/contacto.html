<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Burger Fit</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo"><a href="../index.html">Burger<span>Fit</span></a></div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="../index.html" class="nav-link">Inicio</a></li>
                    <li><a href="tienda.html" class="nav-link">Menú</a></li>
                    <li><a href="nosotros.html" class="nav-link">Nosotros</a></li>
                    <li><a href="contacto.html" class="nav-link active">Contacto</a></li>
                </ul>
            </nav>
            <button class="menu-toggle" aria-label="Abrir menú">
                <i class="fas fa-bars"></i> </button>
        </div>
    </header>

    <main class="container section">
        <div class="contact-wrapper" style="max-width: 600px; margin: 0 auto;">
            <h2 class="text-center">Pide tu Burger Fit hoy</h2>
            <form class="contact-form">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Nombre</label>
                    <input type="text" placeholder="Ingresa tu nombre"
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Mensaje</label>
                    <textarea rows="4" placeholder="¿En qué podemos ayudarte?"
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Ordenar ahora</button>
            </form>
        </div>
    </main>
    <script src="../js/main.js"></script>
</body>

</html>
